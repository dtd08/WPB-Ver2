<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPB Ver 2</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="wrap">
        <main id="main">
            <div id="canvas_wrap">
                <canvas id="canvas"></canvas>
            </div>
        </main>
        <aside id="aside">
            <nav id="menu">
                <div id="option_wrap">
                    <div class="option" id="shapes_n_tools">
                        <div id="tools">
                            <div class="tool" id="brush">
                                <img src="#" alt="브러쉬">
                                <input type="range" name="brush_size" id="brush_size" min="1" max="100">
                            </div>
                            <div class="tool" id="eraser">
                                <img src="#" alt="지우개">
                                <input type="range" name="eraser_size" id="eraser_size" min="1" max="100">
                            </div>
                            <div class="tool" id="bucket">
                                <img src="#" alt="페인트통">
                            </div>
                        </div>
                        <div id="shapes">
                            <div class="shape line"></div>
                            <div class="shape square"></div>
                            <div class="shape circle"></div>
                            <div class="shape trangle"></div>
                        </div>
                    </div>
                    <div class="option" id="choice_color">
                        <div id="colors">
                            <div class="color"></div>
                            <div class="color"></div>
                            <div class="color"></div>
                            <div class="color"></div>
                            <div class="color"></div>
                            <div class="color"></div>
                            <div class="color"></div>
                            <div class="color"></div>
                            <div class="color"></div>
                            <div class="color"></div>
                            <div class="color"></div>
                            <div class="color"></div>
                            <div class="color"></div>
                            <div class="color"></div>
                            <div class="color"></div>
                        </div>
                        <div id="rgb_choice">
                            <div id="choice" style="background-color: #000;"></div>
                            <div id="rgb">
                                <div class="rgb">
                                    <span>R</span>
                                    <input type="range" id="red" min="0" max="255" value="0">
                                    <label for="red">0</label>
                                </div>
                                <div class="rgb">
                                    <span>G</span>
                                    <input type="range" id="green" min="0" max="255" value="0">
                                    <label for="green">0</label>
                                </div>
                                <div class="rgb">
                                    <span>B</span>
                                    <input type="range" id="blue" min="0" max="255" value="0">
                                    <label for="blue">0</label>
                                </div>
                            </div>
                            <button onclick="handleSaveColor()" id="save_color">색상 저장</button>
                        </div>
                    </div>
                </div>

                <div id="btn-wrap">
                    <button id="save" onclick="handleSaveImg()">이미지 저장</button>
                    <button id="post" onclick="handlePost()">게시하기</button>
                </div>
            </nav>
        </aside>
        <footer id="footer">
            <p>Draw Freely in Web Paint Board 2- Made by 이서영</p>
        </footer>
    </div>
</body>
</html>
